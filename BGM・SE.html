<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGM・SE一覧 - soundnovel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="field-theme">
    <div class="volume-control">
        <span class="volume-icon">♪</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
    </div>

    <div class="clouds-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="container">
        <header>
            <nav>
                <div class="logo"><a href="index.html">soundnovel</a></div>
            </nav>
        </header>

        <h1>音響ライブラリ</h1>
        <p>クリックして試聴 ＆ IDをコピー</p>

        <div style="margin: 20px 0; text-align: center;">
            <button id="back-to-editor-top" class="btn primary">エディタに戻る</button>
        </div>
        
        <section class="sound-section">
            <h2 class="category-title">01 - 季節</h2>
            <div class="sound-grid">
                <div class="sound-card" data-audio="01-aki"><span>🍂 秋</span></div>
                <div class="sound-card" data-audio="01-haru"><span>🌸 春</span></div>
                <div class="sound-card" data-audio="01-huyu"><span>❄️ 冬</span></div>
                <div class="sound-card" data-audio="01-natu"><span>🌻 夏</span></div>
                <div class="sound-card" data-audio="10-natu"><span>🎐 夏 (SE)</span></div>
            </div>
        </section>

        <section class="sound-section">
            <h2 class="category-title">02 - 環境・天候</h2>
            <div class="sound-grid">
                <div class="sound-card" data-audio="02-ame"><span>🌧️ 雨</span></div>
                <div class="sound-card" data-audio="02-kaze"><span>🍃 風</span></div>
                <div class="sound-card" data-audio="10-ame"><span>🌧️ 雨 (SE)</span></div>
            </div>
        </section>

        <section class="sound-section">
            <h2 class="category-title">03 - 場所</h2>
            <div class="sound-grid">
                <div class="sound-card" data-audio="03-gakkou"><span>🏫 学校</span></div>
                <div class="sound-card" data-audio="03-inaka"><span>🌾 田舎</span></div>
                <div class="sound-card" data-audio="03-mori"><span>🌲 森</span></div>
                <div class="sound-card" data-audio="03-tokai"><span>🏙️ 都会</span></div>
                <div class="sound-card" data-audio="03-umi"><span>🌊 海</span></div>
                <div class="sound-card" data-audio="10-densya"><span>🚃 電車 (SE)</span></div>
                <div class="sound-card" data-audio="10-mati"><span>🏘️ 街 (SE)</span></div>
                <div class="sound-card" data-audio="10-umi"><span>🏖️ 海 (SE)</span></div>
            </div>
        </section>

        <section class="sound-section">
            <h2 class="category-title">04 - シーン・演出</h2>
            <div class="sound-grid">
                <div class="sound-card" data-audio="00-home"><span>🏠 ホーム</span></div>
                <div class="sound-card" data-audio="04-bouken"><span>⚔️ 冒険</span></div>
                <div class="sound-card" data-audio="04-sentou"><span>🔥 戦闘</span></div>
                <div class="sound-card" data-audio="10-aruku"><span>👣 歩く (SE)</span></div>
                <div class="sound-card" data-audio="10-doa"><span>🚪 ドア (SE)</span></div>
                <div class="sound-card" data-audio="10-hasiru"><span>🏃 走る (SE)</span></div>
                <div class="sound-card" data-audio="10-mekuru"><span>📖 めくる (SE)</span></div>
                <div class="sound-card" data-audio="10-nokku"><span>✊ ノック (SE)</span></div>
                <div class="sound-card" data-audio="10-tokei"><span>⏰ 時計 (SE)</span></div>
            </div>
        </section>

        <div style="margin-top: 40px; text-align: center;">
            <button id="back-to-editor" class="btn primary">エディタに戻る</button>
        </div>

        <footer>
            <a href="index.html">ホームへ戻る</a>
            <p class="credits" style="font-size: 0.8rem; margin-top: 10px; opacity: 0.8;">音楽：独り音 / 効果音：効果音ラボ</p>
        </footer>
    </div>

    <!-- 音声データ -->
    <audio id="audio-home" loop src="audio/00-home.mp3"></audio>
    <audio id="00-home" loop src="audio/00-home.mp3"></audio>
    <audio id="01-aki" loop src="audio/01-aki.mp3"></audio>
    <audio id="01-haru" loop src="audio/01-haru.mp3"></audio>

    <audio id="02-ame" loop src="audio/02-ame.mp3"></audio>
    <audio id="02-kaze" loop src="audio/02-kaze.mp3"></audio>
    <audio id="03-gakkou" loop src="audio/03-gakkou.mp3"></audio>
    <audio id="03-inaka" loop src="audio/03-inaka.mp3"></audio>
    <audio id="03-mori" loop src="audio/03-mori.mp3"></audio>
    <audio id="03-tokai" loop src="audio/03-tokai.mp3"></audio>
    <audio id="03-umi" loop src="audio/03-umi.mp3"></audio>
    <audio id="04-bouken" loop src="audio/04-bouken.mp3"></audio>
    <audio id="04-sentou" loop src="audio/04-sentou.mp3"></audio>
    <audio id="10-ame" src="audio/10-ame.mp3"></audio>
    <audio id="10-aruku" src="audio/10-aruku.mp3"></audio>
    <audio id="10-densya" src="audio/10-densya.mp3"></audio>
    <audio id="10-doa" src="audio/10-doa.mp3"></audio>
    <audio id="10-hasiru" src="audio/10-hasiru.mp3"></audio>
    <audio id="10-mati" src="audio/10-mati.mp3"></audio>
    <audio id="10-mekuru" src="audio/10-mekuru.mp3"></audio>
    <audio id="10-natu" src="audio/10-natu.mp3"></audio>
    <audio id="10-nokku" src="audio/10-nokku.mp3"></audio>
    <audio id="10-tokei" src="audio/10-tokei.mp3"></audio>
    <audio id="10-umi" src="audio/10-umi.mp3"></audio>

    <script type="module" src="script.js"></script>
</body>
</html>
