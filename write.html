<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品を作る - ノベメロ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="volume-control">
        <span class="volume-icon">♪</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
    </div>

    <div class="clouds-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="container">
        <header>
            <nav>
                <div class="logo"><a href="index.html">novemelo</a></div>
                <button id="login-btn" class="btn secondary">Googleでログイン</button>
            </nav>
        </header>

        <div class="editor-container">
            <!-- 左側: 入力エリア -->
            <div class="editor-main">
                <div class="input-row">
                    <input type="text" id="editor-title" placeholder="タイトル">
                    <input type="text" id="editor-author" placeholder="著作者名">
                </div>
                <textarea id="editor-preface" placeholder="前置き"></textarea>
                <div class="editor-body-container" style="position: relative; height: 500px; border: 1px solid #ccc; border-radius: 4px; background: #fff; overflow: hidden;">
                    <!-- 実際のテキストを表示するレイヤー（タグをアイコン化して表示） -->
                    <div id="editor-display" style="
                        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                        padding: 15px; white-space: pre; font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
                        font-size: 16px; line-height: 1.5; color: #333; pointer-events: none;
                        z-index: 1; overflow: hidden; box-sizing: border-box;
                    "></div>
                    
                    <!-- 入力を受け付けるレイヤー（テキストを透明にして重ねる） -->
                    <textarea id="editor-body" placeholder="本文" style="
                        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                        padding: 15px; background: transparent; color: transparent;
                        caret-color: #333; /* カーソルだけは見えるようにする */
                        white-space: pre; overflow-wrap: normal;
                        overflow-x: auto; line-height: 1.5; font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
                        font-size: 16px; border: none; outline: none; z-index: 2;
                        resize: none; box-sizing: border-box;
                    "></textarea>

                    <!-- 音響インジケーター -->
                    <div id="sound-indicator-bar" style="height: 500px; z-index: 3;"></div>
                </div>
            </div>

            <!-- 右側: 操作エリア -->
            <div class="editor-sidebar">
                <div class="sidebar-group">
                    <button id="add-sound-btn" class="btn secondary btn-long">BGM・SEをつける</button>
                    <button id="open-sound-library" class="btn secondary btn-long">BGM・SE一覧</button>
                    <button id="preview-btn" class="btn secondary btn-long">イメージ（プレビュー）</button>
                </div>
                <div class="sidebar-group bottom-actions">
                    <button id="draft-btn" class="btn secondary btn-long">下書き保存</button>
                    <button id="publish-btn" class="btn primary btn-long">投稿</button>
                </div>

                <!-- 音響履歴 -->
                <div class="sidebar-group sound-history-section" style="margin-top: 20px;">
                    <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px; padding-left: 5px;">文中の音響履歴（最新4件）</p>
                    <div id="sound-history-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
                </div>
            </div>
        </div>

        <footer>
            <a href="index.html">ホームへ戻る</a>
            <p class="credits" style="font-size: 0.8rem; margin-top: 10px; opacity: 0.8;">音楽：独り音 / 効果音：効果音ラボ</p>
        </footer>
    </div>

    <audio id="audio-home" loop src="audio/00-home.mp3"></audio>
    <audio id="audio-mekuru" src="audio/10-mekuru.mp3"></audio>
    <audio id="00-home" loop src="audio/00-home.mp3"></audio>
    <audio id="01-aki" loop src="audio/01-aki.mp3"></audio>
    <audio id="01-haru" loop src="audio/01-haru.mp3"></audio>
    <audio id="01-huyu" loop src="audio/01-huyu.mp3"></audio>
    <audio id="01-natu" loop src="audio/01-natu.mp3"></audio>
    <audio id="02-ame" loop src="audio/02-ame.mp3"></audio>
    <audio id="02-kaze" loop src="audio/02-kaze.mp3"></audio>
    <audio id="03-gakkou" loop src="audio/03-gakkou.mp3"></audio>
    <audio id="03-inaka" loop src="audio/03-inaka.mp3"></audio>
    <audio id="03-mori" loop src="audio/03-mori.mp3"></audio>
    <audio id="03-tokai" loop src="audio/03-tokai.mp3"></audio>
    <audio id="03-umi" loop src="audio/03-umi.mp3"></audio>
    <audio id="04-bouken" loop src="audio/04-bouken.mp3"></audio>
    <audio id="04-sentou" loop src="audio/04-sentou.mp3"></audio>
    <audio id="10-ame" src="audio/10-ame.mp3"></audio>
    <audio id="10-aruku" src="audio/10-aruku.mp3"></audio>
    <audio id="10-densya" src="audio/10-densya.mp3"></audio>
    <audio id="10-doa" src="audio/10-doa.mp3"></audio>
    <audio id="10-hasiru" src="audio/10-hasiru.mp3"></audio>
    <audio id="10-mati" src="audio/10-mati.mp3"></audio>
    <audio id="10-mekuru" src="audio/10-mekuru.mp3"></audio>
    <audio id="10-natu" src="audio/10-natu.mp3"></audio>
    <audio id="10-nokku" src="audio/10-nokku.mp3"></audio>
    <audio id="10-tokei" src="audio/10-tokei.mp3"></audio>
    <audio id="10-umi" src="audio/10-umi.mp3"></audio>

    <!-- プレビュー用オーバーレイ -->
    <div id="preview-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a2a3a; z-index: 9999; overflow-y: auto;">
        <div class="underwater-theme" style="min-height: 100%; padding-bottom: 50px;">
            <div class="bubbles-container">
                <div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div>
                <div class="bubble b4"></div><div class="bubble b5"></div>
            </div>
            <div class="container">
                <header>
                    <nav><div class="logo"><img src="novemelo-rogo.png" alt="ノベメロ" style="height: 30px; vertical-align: middle;"> (プレビュー)</div></nav>
                </header>
                <div class="reader-section">
                    <div class="reader-content">
                        <h2 id="preview-title" class="story-title"></h2>
                        <p id="preview-author" class="story-author-name"></p>
                        <div id="preview-preface" class="story-preface"></div>
                        <div id="preview-body" class="text-body"></div>
                        <div class="story-end">― END ―</div>
                    </div>
                    <div class="reader-footer">
                        <button id="close-preview" class="btn secondary">エディタに戻る</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let previewLines = [];
        let currentPreviewIndex = 0;

        const fadeOut = (audio, duration = 1000) => {
            const startVolume = audio.volume;
            const step = startVolume / (duration / 50);
            const timer = setInterval(() => {
                if (audio.volume > step) {
                    audio.volume -= step;
                } else {
                    audio.volume = 0;
                    audio.pause();
                    clearInterval(timer);
                }
            }, 50);
        };

        const fadeIn = (audio, targetVolume, duration = 1000) => {
            audio.volume = 0;
            audio.play().catch(e => console.log("Audio play failed:", e));
            const step = targetVolume / (duration / 50);
            const timer = setInterval(() => {
                if (audio.volume < targetVolume - step) {
                    audio.volume += step;
                } else {
                    audio.volume = targetVolume;
                    clearInterval(timer);
                }
            }, 50);
        };

        const showNextPreviewLine = () => {
            if (currentPreviewIndex < previewLines.length) {
                const lineData = previewLines[currentPreviewIndex];
                const rawText = lineData.raw;
                const p = lineData.el;
                const currentVolume = document.getElementById('volume-slider').value;

                // 音響演出の解析
                const currentLineTags = [];
                let match;
                while ((match = tagRegex.exec(rawText)) !== null) {
                    const [_, type, id] = match;
                    if (type === 'BG') {
                        if (id.startsWith('#') || id.includes('rgb') || ['black', 'white'].includes(id)) {
                            document.querySelector('#preview-overlay .underwater-theme').style.background = id;
                        } else {
                            document.querySelector('#preview-overlay .underwater-theme').className = id + '-theme';
                        }
                    } else {
                        currentLineTags.push(id);
                        const audioEl = document.getElementById(id);
                        if (audioEl) {
                            if (type === 'BGM') {
                                fadeIn(audioEl, currentVolume, 1000);
                            } else {
                                audioEl.volume = currentVolume;
                                audioEl.currentTime = 0;
                                audioEl.play().catch(e => console.log(e));
                            }
                        }
                    }
                }

                // 指定されていない音をフェードアウト
                document.querySelectorAll('audio').forEach(a => {
                    if (a.id !== 'audio-home' && a.id !== 'audio-mekuru' && !currentLineTags.includes(a.id)) {
                        if (!a.paused && a.volume > 0) fadeOut(a, 1000);
                    }
                });

                // 表示処理
                p.classList.add('is-visible');
                p.scrollIntoView({ behavior: 'smooth', block: 'center' });
                currentPreviewIndex++;
            } else {
                const endMarker = document.querySelector('#preview-overlay .story-end');
                if (endMarker && !endMarker.classList.contains('is-visible')) {
                    setTimeout(() => {
                        endMarker.classList.add('is-visible');
                        endMarker.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        // 物語が終わったら「次へ」ボタンを隠す
                        const nextBtn = document.getElementById('mobile-next-btn');
                        if (nextBtn) nextBtn.style.setProperty('display', 'none', 'important');
                    }, 800);
                }
            }
        };

        document.getElementById('preview-btn').addEventListener('click', () => {
            const title = document.getElementById('editor-title').value || '無題';
            const author = document.getElementById('editor-author').value || '名無し';
            const preface = document.getElementById('editor-preface').value;
            const body = document.getElementById('editor-body').value;

            document.getElementById('preview-title').textContent = title;
            document.getElementById('preview-author').textContent = author + ' 著';
            document.getElementById('preview-preface').textContent = preface;
            
            const bodyContainer = document.getElementById('preview-body');
            bodyContainer.innerHTML = '';
            previewLines = [];
            currentPreviewIndex = 0;
            const tagRegex = /\[(BGM|SE|BG):(.+?)\]/g;

            // 空行を除去し、事前にタグを抜いたテキストを設定しておく（高さ計算のズレを防止）
            body.split('\n')
                .map(line => line.trim())
                .filter(line => line !== "")
                .forEach(lineText => {
                    const p = document.createElement('p');
                    // タグを抜いた状態のテキストを先に入れておくことで、ブラウザが正しい高さを把握できる
                    p.textContent = lineText.replace(tagRegex, '');
                    bodyContainer.appendChild(p);
                    previewLines.push({ el: p, raw: lineText });
                });

            // 作成画面のBGMを止める
            const homeAudio = document.getElementById('audio-home');
            if (homeAudio && !homeAudio.paused) {
                fadeOut(homeAudio, 500);
            }

            document.querySelector('#preview-overlay .story-end').classList.remove('is-visible');
            document.getElementById('preview-overlay').style.display = 'block';
            
            // プレビュー開始時にフッター（戻るボタン）を表示し、「次へ」ボタンの状態をリセット
            const footer = document.querySelector('#preview-overlay .reader-footer');
            if (footer) footer.style.display = 'block';
            const nextBtn = document.getElementById('mobile-next-btn');
            if (nextBtn) nextBtn.style.setProperty('display', 'block', 'important');

            document.body.style.overflow = 'hidden';
        });

        document.getElementById('close-preview').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('preview-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
            
            // プレビュー中の音をすべて停止
            document.querySelectorAll('audio').forEach(a => {
                if (a.id !== 'audio-home') {
                    a.pause();
                    a.currentTime = 0;
                }
            });
            // ホームBGMを再開
            if (typeof startHomeBgm === 'function') {
                startHomeBgm();
            }
        });

        document.getElementById('preview-overlay').addEventListener('click', (e) => {
            // 「次へ」ボタン自体がクリックされた場合は物語を進める
            if (e.target.id === 'mobile-next-btn' || e.target.closest('#mobile-next-btn')) {
                showNextPreviewLine();
                return;
            }
            // それ以外のフッター（エディタに戻るボタンなど）のクリックは無視
            if (e.target.closest('.reader-footer')) return;
            showNextPreviewLine();
        });

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('preview-overlay').style.display === 'block' && e.code === 'Space') {
                e.preventDefault();
                showNextPreviewLine();
            }
        });
    </script>
    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
