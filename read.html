<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閲覧中 - soundnovel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="underwater-theme">
    <div class="volume-control">
        <span class="volume-icon">♪</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
    </div>

    <div class="bubbles-container">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
        <div class="bubble b5"></div>
    </div>

    <div class="container">
        <header>
            <nav>
                <div class="logo"><a href="index.html">soundnovel</a></div>
                <button id="login-btn" class="btn secondary">Googleでログイン</button>
            </nav>
        </header>

        <div class="reader-section">
            <div class="reader-content">
                <h2 class="story-title">終電の後</h2>
                <p class="story-author-name">soundnovel team 著</p>
                <div class="story-preface"></div>
                
                <div class="text-body">
                    <p>[BGM:02-ame]遠くで踏切の音が聞こえる。</p>
                    <p>時計の針は、もう戻れない時間を指していた。</p>
                    <p>[SE:10-aruku]「行っちゃったね」</p>
                    <p>彼女は小さく笑って、自動販売機の明かりに照らされた。</p>
                    <div id="story-end-marker" class="story-end">― END ―</div>
                </div>
            </div>

            <div class="reader-footer">
                <button id="back-to-library" class="btn secondary">一覧に戻る</button>
            </div>
        </div>

        <footer style="margin-top: 20px; text-align: center;">
            <p class="credits" style="font-size: 0.8rem; opacity: 0.8;">音楽：独り音 / 効果音：効果音ラボ</p>
        </footer>
    </div>

    <!-- 音声素材の定義 -->
    <audio id="audio-home" loop src="audio/00-home.mp3"></audio>
    <audio id="00-home" loop src="audio/00-home.mp3"></audio>
    <audio id="01-aki" loop src="audio/01-aki.mp3"></audio>
    <audio id="01-haru" loop src="audio/01-haru.mp3"></audio>

    <audio id="01-natu" loop src="audio/01-natu.mp3"></audio>

    <audio id="03-gakkou" loop src="audio/03-gakkou.mp3"></audio>
    <audio id="03-inaka" loop src="audio/03-inaka.mp3"></audio>
    <audio id="03-mori" loop src="audio/03-mori.mp3"></audio>
    <audio id="03-tokai" loop src="audio/03-tokai.mp3"></audio>
    <audio id="03-umi" loop src="audio/03-umi.mp3"></audio>
    <audio id="04-bouken" loop src="audio/04-bouken.mp3"></audio>
    <audio id="04-sentou" loop src="audio/04-sentou.mp3"></audio>
    <audio id="10-ame" src="audio/10-ame.mp3"></audio>
    <audio id="10-aruku" src="audio/10-aruku.mp3"></audio>
    <audio id="10-densya" src="audio/10-densya.mp3"></audio>

    <script type="module" src="firebase.js"></script>
