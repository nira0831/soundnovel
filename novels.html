<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品一覧 - soundnovel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="beach-theme">
    <div class="volume-control">
        <span class="volume-icon">♪</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
    </div>

    <div class="clouds-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="container">
        <header>
            <nav>
                <div class="logo"><a href="index.html">soundnovel</a></div>
            </nav>
        </header>

        <section class="library-section">
            <h2 class="section-title">物語を選ぶ</h2>
            <div class="story-grid">
                <!-- 静的な作品例 -->
                <div class="story-card">
                    <h3>終電の後</h3>
                    <p class="story-author">by soundnovel team</p>
                    <p class="story-desc">終電を逃した二人の、静かな夜の記録。</p>
                    <div class="card-buttons">
                        <button class="btn primary">読む</button>
                    </div>
                </div>
                <!-- ユーザー投稿作品はここに動的に追加される -->
            </div>
        </section>

        <footer>
            <a href="index.html">ホームへ戻る</a>
            <p class="credits" style="font-size: 0.8rem; margin-top: 10px; opacity: 0.8;">音楽：独り音 / 効果音：効果音ラボ</p>
        </footer>
    </div>
    <audio id="audio-home" loop src="audio/00-home.mp3"></audio>
    <audio id="audio-mekuru" src="audio/10-mekuru.mp3"></audio>
    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
    
</body>
</html>
