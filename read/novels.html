<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>作品一覧 - SoundNovel</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="beach-theme">

  <!-- 画面に固定される音量調節バー -->
  <div class="volume-control">
    <span class="volume-icon">♪</span>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
  </div>

  <div class="container camera-down-enter">
    <!-- 背景の雲（コンテナと一緒に移動させる） -->
    <div class="clouds-container">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>

    <header>
      <nav>
        <div class="logo"><a href="../index.html" style="text-decoration: none; color: inherit;">SoundNovel</a></div>
      </nav>
    </header>

    <main class="library-section">
      <h2 class="section-title">物語を探す</h2>
      
      <div class="story-grid">
        <div class="story-card">
          <h3>終電の後</h3>
          <p class="story-author">by niraGPT</p>
          <p class="story-desc">雨の中終電を逃してしまいー...</p>
          <button id="read-story-1" class="btn primary">読む</button>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; SoundNovel. Music by <a href="https://az-ho.org/" target="_blank" rel="noopener noreferrer" style="color: inherit;">独り音</a> / SE by <a href="https://soundeffect-lab.info/" target="_blank" rel="noopener noreferrer" style="color: inherit;">効果音ラボ</a></p>
    </footer>
  </div>

  <!-- 音声素材 -->
  <audio id="audio-home" src="../audio/00-home.mp3" loop></audio>
  <audio id="audio-mekuru" src="../audio/10-mekuru.mp3"></audio>

  <script src="../script.js"></script>
</body>
</html>
