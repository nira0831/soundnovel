<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SoundNovel - 小説投稿プラットフォーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 画面に固定される音量調節バー -->
  <div class="volume-control">
    <span class="volume-icon">♪</span>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
  </div>

  <div class="container">
    <!-- 背景の雲（コンテナと一緒に移動させる） -->
    <div class="clouds-container">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>

    <header>
      <nav>
        <div class="logo">SoundNovel</div>
      </nav>
    </header>

    <main class="hero-section">
      <h1>あなたの物語を、<br>音とともに世界へ届けよう。</h1>
      <p class="subtitle">SoundNovelは、誰でも自由に小説を書き、読み、聴くことができる場所です。</p>
      
      <div class="cta-buttons">
        <button id="read-btn" class="btn primary">作品を読む</button>
        <button id="write-btn" class="btn secondary">小説を書く</button>
      </div>
    </main>

    <footer>
      <p>&copy; SoundNovel. Music by <a href="https://az-ho.org/" target="_blank" rel="noopener noreferrer" style="color: inherit;">独り音</a> / SE by <a href="https://soundeffect-lab.info/" target="_blank" rel="noopener noreferrer" style="color: inherit;">効果音ラボ</a></p>
    </footer>
  </div>

  <!-- 音声素材 -->
  <audio id="audio-home" src="audio/00-home.mp3" loop></audio>
  <audio id="audio-mekuru" src="audio/10-mekuru.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
