<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="google-site-verification" content="Rd8fbstrTHfcmoZAVgdHQa5O4ZothgmFUa8TnJ2yx0E" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ノベメロ - ホーム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ヒーローロゴのカスタマイズ */
        .hero-logo-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            animation: logo-float 4s ease-in-out infinite;
            cursor: default;
        }
        .hero-logo-img {
            max-width: 450px;
            height: auto;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
            mix-blend-mode: multiply;
        }
        @keyframes logo-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1.5deg); }
        }
        @media screen and (max-width: 768px) {
            .hero-logo-img { max-width: 80%; }
        }
    </style>
</head>
<body>
    <div class="volume-control">
        <span class="volume-icon">♪</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
    </div>

    <div class="clouds-container">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
    </div>

    <div class="container">
        <header>
            <nav>
                <div class="logo"><a href="index.html">novemelo</a></div>
                <button id="login-btn" class="btn secondary">Googleでログイン</button>
            </nav>
        </header>

        <main class="hero-section">
            <div class="hero-logo-container">
                <img src="novemelo-rogo.png" alt="ノベメロ" class="hero-logo-img">
            </div>
            <p class="subtitle">作品を読んで聴いて書いて楽しもう</p>
            <div class="cta-buttons">
                <button id="read-btn" class="btn primary">作品を読む</button>
                <button id="write-btn" class="btn secondary">作品を作る</button>
            </div>
        </main>

        <footer>
            <p>&copy;novemelo</p>
            <p class="credits" style="font-size: 0.8rem; margin-top: 10px; opacity: 0.8;">音楽：独り音 / 効果音：効果音ラボ</p>
        </footer>
    </div>

    <!-- BGM & SE -->
    <audio id="audio-home" loop src="audio/00-home.mp3"></audio>
    <audio id="audio-mekuru" src="audio/10-mekuru.mp3"></audio>
    <!-- ログイン失敗時にメッセージを表示する場所を追加しておくと親切です -->
    <div id="auth-error-message" style="color: #ff6b6b; text-align: center; margin-top: 10px; font-size: 0.9rem;"></div>
    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
